<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>测试区域 | The Wandering Fiction</title>
  <link rel="shortcut icon" href="/img/wf002.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="particle-canvas" aria-hidden="true"></canvas>
  <div class="page-overlay"></div>

  <main class="container">
    <header class="hero glass">
      <p class="eyebrow">The Wandering Fiction · Interactive Lab</p>
      <h1>WF 互动测试区域</h1>
      <p class="subtitle">融合叙事、粒子氛围、点击反馈与更深层分支剧情的实验页面。</p>
    </header>

    <section class="card glass" aria-labelledby="quiz-title">
      <h2 id="quiz-title">WF 快速问答</h2>
      <p class="question">在 WF 叙事里，以下哪项更接近核心气质？</p>
      <form id="quiz-form" class="options">
        <label><input type="radio" name="answer" value="surface" /> 只追求表层华丽，忽略内在逻辑</label>
        <label><input type="radio" name="answer" value="balance" /> 在理性和幻想之间保持张力与反思</label>
        <label><input type="radio" name="answer" value="noise" /> 随机堆砌设定，不构建情绪线索</label>
      </form>
      <div class="actions">
        <button id="quiz-submit" type="button">校验认知</button>
      </div>
      <p id="quiz-feedback" class="feedback" aria-live="polite"></p>
    </section>

    <section class="card glass" aria-labelledby="adventure-title">
      <h2 id="adventure-title">WF 微型 Galgame：雾海投影</h2>

      <div class="hud">
        <div class="stat"><span>理性</span><b id="stat-reason">50</b></div>
        <div class="stat"><span>幻想</span><b id="stat-fantasy">50</b></div>
        <div class="stat"><span>回响</span><b id="stat-echo">0</b></div>
      </div>

      <article class="dialogue-box">
        <p id="speaker" class="speaker">旁白</p>
        <p id="story" class="story"></p>
      </article>

      <div id="adventure-actions" class="actions"></div>
      <p id="adventure-feedback" class="feedback" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
