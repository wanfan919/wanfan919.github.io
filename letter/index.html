<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WF 留言板</title>
  <meta name="description" content="WF 网站留言板，支持登录后留言与删除自己的留言。">
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --line: #374151;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22d3ee;
      --danger: #ef4444;
      --ok: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: radial-gradient(circle at 20% 10%, #1e293b, #020617 56%);
      font-family: "PingFang SC", "Noto Sans SC", sans-serif;
    }
    .wrap { width: min(980px, 94vw); margin: 24px auto 40px; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .title {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .top a { color: #d1d5db; text-decoration: none; }
    .panel {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-top: 14px;
    }
    .status { font-size: 13px; color: var(--muted); margin-top: 8px; }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }

    .grid { display: grid; grid-template-columns: 320px 1fr; gap: 14px; }
    @media (max-width: 920px) { .grid { grid-template-columns: 1fr; } }

    input, textarea, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      padding: 10px;
    }
    textarea { min-height: 120px; resize: vertical; }
    button { border: none; cursor: pointer; background: linear-gradient(90deg, #0ea5e9, #8b5cf6); }
    button.ghost { background: #1f2937; border: 1px solid #4b5563; }
    button.danger { background: #991b1b; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .btn-row { display: flex; gap: 8px; margin-top: 8px; }

    .list { display: grid; gap: 10px; max-height: 70vh; overflow: auto; }
    .item { border: 1px solid var(--line); background: #0b1220; border-radius: 10px; padding: 10px; }
    .meta { color: #93c5fd; font-size: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; }
    .empty { color: var(--muted); font-size: 14px; padding: 16px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title">WF 留言板</div>
      <a href="/">返回首页</a>
    </div>

    <div id="configWarning" class="panel status err" style="display:none;"></div>

    <div class="grid">
      <section class="panel">
        <h3>账号</h3>
        <div id="authState" class="status">未登录</div>
        <input id="username" placeholder="账号名（3-20字符）">
        <input id="password" type="password" placeholder="密码（至少6位）" style="margin-top:8px;">
        <div class="btn-row">
          <button id="registerBtn" class="ghost">注册</button>
          <button id="loginBtn">登录</button>
          <button id="logoutBtn" class="ghost">退出</button>
        </div>

        <h3 style="margin-top:18px;">写留言</h3>
        <textarea id="messageInput" placeholder="写点什么吧..." disabled></textarea>
        <button id="sendBtn" style="margin-top:8px;" disabled>发布留言</button>
        <div id="actionMsg" class="status"></div>
      </section>

      <section class="panel">
        <h3>最新留言</h3>
        <div id="messageList" class="list"></div>
      </section>
    </div>
  </div>

  <script>
    const API_BASE = 'https://hidden-rain-bb9b.wangderingfiction.workers.dev';
    const TOKEN_KEY = 'source_wf_token';
    const USER_KEY = 'source_wf_user';

    const state = {
      token: localStorage.getItem(TOKEN_KEY) || '',
      user: localStorage.getItem(USER_KEY) || '',
      messages: []
    };

    const $ = id => document.getElementById(id);

    const setActionMsg = (msg, cls = '') => {
      const el = $('actionMsg');
      el.className = `status ${cls}`;
      el.textContent = msg;
    };

    const setAuthState = () => {
      $('authState').textContent = state.user ? `已登录：${state.user}` : '未登录';
      const canPost = !!state.user;
      $('messageInput').disabled = !canPost;
      $('sendBtn').disabled = !canPost;
    };

    const formatTime = ts => {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };

    const api = async (path, options = {}) => {
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (state.token) headers.Authorization = `Bearer ${state.token}`;
      const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    };

    const renderMessages = () => {
      const list = $('messageList');
      list.innerHTML = '';
      if (!state.messages.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '还没有留言，来抢个沙发吧。';
        list.appendChild(empty);
        return;
      }

      state.messages.forEach(m => {
        const item = document.createElement('div');
        item.className = 'item';

        const safeContent = m.content.replace(/</g, '&lt;');
        const canDelete = state.user && state.user === m.username;
        item.innerHTML = `
          <div class="meta">
            <span>${m.username} · ${formatTime(m.created_at)}</span>
            ${canDelete ? `<button class="danger" data-id="${m.id}" style="width:auto;padding:4px 8px;font-size:12px;">删除</button>` : ''}
          </div>
          <div>${safeContent}</div>
        `;

        const btn = item.querySelector('button[data-id]');
        if (btn) {
          btn.onclick = async () => {
            try {
              await api(`/api/messages/${m.id}`, { method: 'DELETE' });
              setActionMsg('留言已删除', 'ok');
              await loadMessages();
            } catch (err) {
              setActionMsg(err.message, 'err');
            }
          };
        }

        list.appendChild(item);
      });
    };

    const loadMessages = async () => {
      const data = await api('/api/messages', { method: 'GET' });
      state.messages = data.messages || [];
      renderMessages();
    };

    $('registerBtn').onclick = async () => {
      try {
        await api('/api/register', {
          method: 'POST',
          body: JSON.stringify({ username: $('username').value.trim(), password: $('password').value })
        });
        setActionMsg('注册成功，请登录', 'ok');
      } catch (err) {
        setActionMsg(err.message, 'err');
      }
    };

    $('loginBtn').onclick = async () => {
      try {
        const data = await api('/api/login', {
          method: 'POST',
          body: JSON.stringify({ username: $('username').value.trim(), password: $('password').value })
        });
        state.token = data.token;
        state.user = data.username;
        localStorage.setItem(TOKEN_KEY, state.token);
        localStorage.setItem(USER_KEY, state.user);
        setAuthState();
        setActionMsg('登录成功', 'ok');
        renderMessages();
      } catch (err) {
        setActionMsg(err.message, 'err');
      }
    };

    $('logoutBtn').onclick = () => {
      state.token = '';
      state.user = '';
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(USER_KEY);
      setAuthState();
      setActionMsg('已退出登录', 'ok');
      renderMessages();
    };

    $('sendBtn').onclick = async () => {
      try {
        if (!state.token) throw new Error('请先登录');
        const content = $('messageInput').value.trim();
        if (!content) throw new Error('留言内容不能为空');
        await api('/api/messages', {
          method: 'POST',
          body: JSON.stringify({ content })
        });
        $('messageInput').value = '';
        setActionMsg('留言发布成功', 'ok');
        await loadMessages();
      } catch (err) {
        setActionMsg(err.message, 'err');
      }
    };

    const boot = async () => {
      if (!API_BASE) {
        $('configWarning').style.display = 'block';
        $('configWarning').textContent = '未配置后端接口：请将 letter/index.html 里的 API_BASE 替换为你的 Worker 地址。';
      }
      setAuthState();
      try {
        await loadMessages();
      } catch (err) {
        setActionMsg(`加载留言失败：${err.message}`, 'err');
      }
      setInterval(() => loadMessages().catch(() => {}), 10000);
    };

    boot();
  </script>
</body>
</html>
