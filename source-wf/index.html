<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>源--WF</title>
  <meta name="description" content="源--WF：多人协作流浪小说平台。">
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22d3ee;
      --accent-2: #a78bfa;
      --danger: #ef4444;
      --ok: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: radial-gradient(circle at 20% 10%, #1e293b, #020617 56%);
      font-family: "PingFang SC", "Noto Sans SC", sans-serif;
    }
    .wrap { width: min(1200px, 94vw); margin: 20px auto 40px; }
    .top {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .title {
      font-size: clamp(28px, 5vw, 46px); font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .top a { color: #d1d5db; text-decoration: none; font-size: 14px; }
    .top-right { display: flex; align-items: center; gap: 10px; }
    .msg-center-btn {
      position: relative;
      width: auto;
      padding: 8px 14px;
      background: #111827;
      border: 1px solid #4b5563;
      border-radius: 999px;
      color: #e5e7eb;
      font-size: 13px;
      cursor: pointer;
    }
    .msg-center-btn .dot {
      display: none;
      position: absolute;
      top: -2px;
      right: -2px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 0 2px #0f172a;
    }
    .msg-center-btn.has-unread .dot { display: block; }
    .note { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
    .hint { color: #cbd5e1; font-size: 12px; margin-top: 4px; }

    .layout { display: grid; grid-template-columns: 320px 1fr; gap: 14px; }
    .panel { background: rgba(17, 24, 39, 0.92); border: 1px solid #374151; border-radius: 14px; padding: 14px; }
    .panel h3 { margin: 0 0 12px; }

    .auth-row, .new-row { display: grid; gap: 8px; }
    input, textarea, button, select {
      width: 100%; border-radius: 10px; border: 1px solid #374151; background: #0b1220;
      color: var(--text); padding: 10px;
    }
    textarea { min-height: 110px; resize: vertical; }
    button { cursor: pointer; background: linear-gradient(90deg, #0ea5e9, #8b5cf6); border: none; }
    button.ghost { background: #1f2937; border: 1px solid #4b5563; }
    button.danger { background: #991b1b; }
    button:disabled { opacity: 0.45; cursor: not-allowed; filter: grayscale(0.35); }
    .btn-row { display: flex; gap: 8px; }

    .project-list { max-height: 520px; overflow: auto; display: grid; gap: 8px; }
    .project-item {
      border: 1px solid #374151; border-radius: 10px; padding: 10px; cursor: pointer;
      background: #0b1220;
    }
    .project-item.active { border-color: var(--accent); }
    .project-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }

    .segments { max-height: 420px; overflow: auto; display: grid; gap: 10px; margin-bottom: 10px; }
    .seg { border-left: 3px solid #22d3ee; padding: 8px 10px; background: #0b1220; border-radius: 0 8px 8px 0; }
    .seg .who { color: #93c5fd; font-size: 12px; margin-bottom: 4px; }
    .status { font-size: 13px; margin: 8px 0; color: var(--muted); }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }
    .small-title { font-size: 15px; font-weight: 700; margin: 10px 0 8px; }
    .mini-list { max-height: 220px; overflow: auto; display: grid; gap: 8px; }
    .mini-item { border: 1px solid #374151; border-radius: 8px; padding: 8px; background: #0b1220; }
    .mini-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .admin-box { margin-top: 14px; padding-top: 10px; border-top: 1px dashed #374151; }
    .unread-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 6px;
      background: #f59e0b;
      vertical-align: middle;
    }
    .msg-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9998;
      background: rgba(2, 6, 23, 0.65);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .msg-modal.open { display: flex; }
    .msg-card {
      width: min(760px, 96vw);
      max-height: 86vh;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid #374151;
      background: #0b1220;
      display: flex;
      flex-direction: column;
    }
    .msg-head {
      padding: 12px 14px;
      border-bottom: 1px solid #374151;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .msg-body {
      padding: 12px 14px 14px;
      overflow: auto;
      display: grid;
      gap: 8px;
    }
    .msg-tools {
      display: flex;
      gap: 8px;
      width: auto;
    }
    .msg-tools button { width: auto; padding: 8px 10px; }

    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title">源--WF</div>
      <div class="top-right">
        <button id="msgCenterBtn" class="msg-center-btn" type="button">消息中心<span class="dot"></span></button>
        <a href="/">返回首页</a>
      </div>
    </div>
    <div class="note">流浪小说：注册登录后可创建和续写。每次续写都记录账号名；同一时间仅一人可写。</div>

    <div id="configWarning" class="panel status err" style="display:none;"></div>

    <div class="layout">
      <section class="panel">
        <h3>账号</h3>
        <div id="authState" class="status">未登录</div>
        <div class="auth-row">
          <input id="username" placeholder="账号名（3-20字符）">
          <input id="password" type="password" placeholder="密码（至少6位）">
          <div class="btn-row">
            <button id="registerBtn" class="ghost">注册</button>
            <button id="loginBtn">登录</button>
            <button id="logoutBtn" class="ghost">退出</button>
          </div>
        </div>

        <h3 style="margin-top:18px;">新建流浪小说项目</h3>
        <div class="new-row">
          <input id="projectName" placeholder="项目名，例如：雪夜城邦">
          <textarea id="starterText" placeholder="留空则 AI 生成开头；也可自己写开头"></textarea>
          <button id="createBtn">新建项目</button>
          <div class="hint">说明：点击“新建项目”后请等待响应，只需按一次。</div>
        </div>
      </section>

      <section class="panel">
        <h3>项目与续写</h3>
        <div class="layout" style="grid-template-columns: 260px 1fr; gap:12px;">
          <div>
            <div class="project-list" id="projectList"></div>
          </div>
          <div>
            <div id="projectTitle" style="font-size:20px;font-weight:700;margin-bottom:6px;">请选择一个项目</div>
            <div id="projectStatus" class="status"></div>
            <div id="segments" class="segments"></div>

            <textarea id="continuation" placeholder="输入你的续写..." disabled></textarea>
            <div class="btn-row" style="margin-top:8px;">
              <button id="lockBtn" class="ghost">申请续写权</button>
              <button id="appendBtn">提交续写+移交续写权</button>
              <button id="completeBtn" class="danger">完成项目</button>
              <button id="deleteBtn" class="danger">删除项目</button>
            </div>
            <div id="actionMsg" class="status"></div>

            <div id="adminPanel" class="admin-box" style="display:none;">
              <div class="small-title">管理员控制台（Administrator）</div>
              <div class="status">可查看所有账号及项目，支持强制删除/完成/重新开放，并向指定用户发送提醒。</div>
              <div class="new-row" style="margin-bottom:10px;">
                <select id="adminUserSelect"></select>
                <input id="adminMsgTitle" placeholder="消息标题，例如：请完善剧情逻辑">
                <textarea id="adminMsgContent" placeholder="输入提醒、建议或警告内容"></textarea>
                <button id="adminSendBtn">发送管理员消息</button>
              </div>
              <div class="small-title">账号列表</div>
              <div id="adminUsers" class="mini-list"></div>
              <div class="small-title">项目列表（管理员操作）</div>
              <div id="adminProjects" class="mini-list"></div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <div id="msgModal" class="msg-modal" aria-hidden="true">
    <div class="msg-card">
      <div class="msg-head">
        <strong>消息中心</strong>
        <div class="msg-tools">
          <button id="markAllReadBtn" class="ghost" type="button">一键已读</button>
          <button id="closeMsgModalBtn" class="ghost" type="button">关闭</button>
        </div>
      </div>
      <div id="msgCenterList" class="msg-body"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://hidden-rain-bb9b.wangderingfiction.workers.dev';
    const TOKEN_KEY = 'source_wf_token';
    const USER_KEY = 'source_wf_user';

    const state = {
      token: localStorage.getItem(TOKEN_KEY) || '',
      user: localStorage.getItem(USER_KEY) || '',
      projects: [],
      currentProjectId: null,
      currentProject: null,
      lockKeepAliveTimer: null,
      notifications: [],
      unreadCount: 0,
      adminOverview: { users: [], projects: [] },
      isAdmin: false
    };

    const $ = id => document.getElementById(id);
    const esc = str => String(str || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const fmt = ts => ts ? new Date(ts).toLocaleString('zh-CN') : '-';

    const setActionMsg = (msg, cls = '') => {
      const el = $('actionMsg');
      el.className = `status ${cls}`;
      el.textContent = msg;
    };

    const setAuthState = () => {
      $('authState').textContent = state.user ? `已登录：${state.user}` : '未登录';
      const loggedIn = !!state.user;
      state.isAdmin = state.user === 'Administrator';
      $('projectName').disabled = !loggedIn;
      $('starterText').disabled = !loggedIn;
      $('createBtn').disabled = !loggedIn;
      $('lockBtn').disabled = !loggedIn || !state.currentProjectId;
      $('deleteBtn').disabled = true;
      $('completeBtn').disabled = true;
      $('adminPanel').style.display = state.isAdmin ? 'block' : 'none';
      if (!loggedIn) {
        $('continuation').disabled = true;
        $('appendBtn').disabled = true;
        state.notifications = [];
        state.unreadCount = 0;
        state.adminOverview = { users: [], projects: [] };
        renderNotifications();
        renderAdminOverview();
      }
    };

    const api = async (path, options = {}) => {
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (state.token) headers.Authorization = `Bearer ${state.token}`;
      const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    };

    const renderProjects = () => {
      const list = $('projectList');
      list.innerHTML = '';
      state.projects.forEach(p => {
        const div = document.createElement('div');
        div.className = `project-item${p.id === state.currentProjectId ? ' active' : ''}`;
        div.innerHTML = `<div>${p.name}</div><div class="project-meta">${p.status === 'completed' ? '已完成' : '进行中'} · 创建者：${p.creator_name}</div>`;
        div.onclick = () => selectProject(p.id);
        list.appendChild(div);
      });
    };

    const renderProjectDetail = () => {
      const p = state.currentProject;
      if (!p) {
        $('projectTitle').textContent = '请选择一个项目';
        $('projectStatus').textContent = '';
        $('segments').innerHTML = '';
        $('continuation').disabled = true;
        $('appendBtn').disabled = true;
        $('completeBtn').disabled = true;
        $('lockBtn').disabled = true;
        $('deleteBtn').disabled = true;
        return;
      }
      $('projectTitle').textContent = p.name;
      const lockText = p.lock_owner_name ? `当前续写者：${p.lock_owner_name}` : '当前无人续写';
      const doneText = p.status === 'completed' ? '已完成' : '进行中';
      $('projectStatus').textContent = `${doneText} · ${lockText}`;

      const seg = $('segments');
      seg.innerHTML = '';
      p.segments.forEach(s => {
        const item = document.createElement('div');
        item.className = 'seg';
        item.innerHTML = `<div class="who">${s.username}</div><div>${s.content.replace(/</g, '&lt;')}</div>`;
        seg.appendChild(item);
      });

      const canWrite = p.status !== 'completed' && p.lock_owner_name === state.user;
      const isCreator = state.user && p.creator_name === state.user;
      $('continuation').disabled = !canWrite;
      $('appendBtn').disabled = !canWrite;
      $('completeBtn').disabled = !(isCreator && p.status !== 'completed');
      $('lockBtn').disabled = !state.user || p.status === 'completed';
      $('deleteBtn').disabled = !isCreator;
    };

    const renderNotifications = () => {
      const box = $('msgCenterList');
      const msgBtn = $('msgCenterBtn');
      msgBtn.classList.toggle('has-unread', state.unreadCount > 0);
      box.innerHTML = '';
      if (!state.user) {
        box.innerHTML = '<div class="mini-item">登录后可查看管理员消息。</div>';
        return;
      }
      if (!state.notifications.length) {
        box.innerHTML = '<div class="mini-item">暂无消息。</div>';
        return;
      }

      state.notifications.forEach(n => {
        const row = document.createElement('div');
        row.className = 'mini-item';
        const from = n.from_username ? `来自：${esc(n.from_username)}` : '系统通知';
        const unreadDot = n.read_at ? '' : '<span class="unread-dot"></span>';
        row.innerHTML = `
          <div>${unreadDot}<strong>${esc(n.title)}</strong></div>
          <div style="margin-top:4px;">${esc(n.content)}</div>
          <div class="mini-meta">${from} · ${fmt(n.created_at)}</div>
        `;
        row.onclick = async () => {
          if (n.read_at) return;
          try {
            await api(`/api/notifications/${n.id}/read`, { method: 'POST', body: '{}' });
            n.read_at = Date.now();
            state.unreadCount = state.notifications.reduce((acc, item) => acc + (item.read_at ? 0 : 1), 0);
            renderNotifications();
          } catch (_) {}
        };
        box.appendChild(row);
      });
    };

    const renderAdminOverview = () => {
      if (!state.isAdmin) return;

      const users = state.adminOverview.users || [];
      const projects = state.adminOverview.projects || [];

      const select = $('adminUserSelect');
      select.innerHTML = '';
      if (!users.length) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = '暂无其他账号';
        select.appendChild(opt);
      } else {
        users.forEach(u => {
          const opt = document.createElement('option');
          opt.value = String(u.id);
          opt.textContent = `${u.username}（项目 ${u.project_count || 0}）`;
          select.appendChild(opt);
        });
      }

      const usersBox = $('adminUsers');
      usersBox.innerHTML = users.length
        ? users.map(u => `<div class="mini-item"><div><strong>${esc(u.username)}</strong></div><div class="mini-meta">创建项目数：${u.project_count || 0} · 注册：${fmt(u.created_at)}</div></div>`).join('')
        : '<div class="mini-item">暂无其他用户。</div>';

      const pBox = $('adminProjects');
      pBox.innerHTML = '';
      if (!projects.length) {
        pBox.innerHTML = '<div class="mini-item">暂无项目。</div>';
        return;
      }
      projects.forEach(p => {
        const row = document.createElement('div');
        row.className = 'mini-item';
        row.innerHTML = `
          <div><strong>${esc(p.name)}</strong></div>
          <div class="mini-meta">创建者：${esc(p.creator_name)} · 状态：${p.status === 'completed' ? '已完成' : '进行中'}</div>
          <div class="btn-row" style="margin-top:6px;">
            <button class="danger" data-admin-action="force-delete" data-project-id="${p.id}">强制删除</button>
            <button data-admin-action="force-complete" data-project-id="${p.id}" ${p.status === 'completed' ? 'disabled' : ''}>强制完成</button>
            <button class="ghost" data-admin-action="reopen" data-project-id="${p.id}" ${p.status !== 'completed' ? 'disabled' : ''}>重新开放</button>
          </div>
        `;
        pBox.appendChild(row);
      });
    };

    const loadProjects = async () => {
      const data = await api('/api/projects', { method: 'GET' });
      state.projects = data.projects || [];
      renderProjects();
      if (state.currentProjectId) {
        await loadProjectDetail(state.currentProjectId);
      }
    };

    const loadNotifications = async () => {
      if (!state.token) {
        state.notifications = [];
        state.unreadCount = 0;
        renderNotifications();
        return;
      }
      const data = await api('/api/notifications', { method: 'GET' });
      state.notifications = data.notifications || [];
      state.unreadCount = Number(data.unreadCount || 0);
      renderNotifications();
    };

    const loadAdminOverview = async () => {
      if (!state.isAdmin || !state.token) {
        state.adminOverview = { users: [], projects: [] };
        renderAdminOverview();
        return;
      }
      const data = await api('/api/admin/overview', { method: 'GET' });
      state.adminOverview = {
        users: data.users || [],
        projects: data.projects || []
      };
      renderAdminOverview();
    };

    const loadProjectDetail = async (id) => {
      const data = await api(`/api/projects/${id}`, { method: 'GET' });
      state.currentProject = data.project;
      state.currentProjectId = id;
      renderProjects();
      renderProjectDetail();
    };

    const selectProject = async (id) => {
      try {
        await loadProjectDetail(id);
      } catch (err) {
        setActionMsg(err.message, 'err');
      }
    };

    const startLockHeartbeat = () => {
      stopLockHeartbeat();
      state.lockKeepAliveTimer = setInterval(async () => {
        if (!state.currentProjectId || !state.token) return;
        try {
          await api(`/api/projects/${state.currentProjectId}/lock`, { method: 'POST', body: '{}' });
        } catch (_) {}
      }, 20000);
    };

    const stopLockHeartbeat = () => {
      if (state.lockKeepAliveTimer) clearInterval(state.lockKeepAliveTimer);
      state.lockKeepAliveTimer = null;
    };

    const openMsgCenter = () => {
      $('msgModal').classList.add('open');
      $('msgModal').setAttribute('aria-hidden', 'false');
    };

    const closeMsgCenter = () => {
      $('msgModal').classList.remove('open');
      $('msgModal').setAttribute('aria-hidden', 'true');
    };

    $('registerBtn').onclick = async () => {
      try {
        await api('/api/register', {
          method: 'POST',
          body: JSON.stringify({ username: $('username').value.trim(), password: $('password').value })
        });
        setActionMsg('注册成功，请登录', 'ok');
      } catch (err) {
        setActionMsg(err.message, 'err');
      }
    };

    $('loginBtn').onclick = async () => {
      try {
        const data = await api('/api/login', {
          method: 'POST',
          body: JSON.stringify({ username: $('username').value.trim(), password: $('password').value })
        });
        state.token = data.token;
        state.user = data.username;
        localStorage.setItem(TOKEN_KEY, state.token);
        localStorage.setItem(USER_KEY, state.user);
        setAuthState();
        setActionMsg('登录成功', 'ok');
        await loadProjects();
        await loadNotifications();
        await loadAdminOverview();
      } catch (err) {
        setActionMsg(err.message, 'err');
      }
    };

    $('logoutBtn').onclick = () => {
      state.token = '';
      state.user = '';
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(USER_KEY);
      stopLockHeartbeat();
      closeMsgCenter();
      setAuthState();
      setActionMsg('已退出登录', 'ok');
      renderProjectDetail();
      renderNotifications();
      renderAdminOverview();
    };

    $('msgCenterBtn').onclick = async () => {
      openMsgCenter();
      try {
        await loadNotifications();
      } catch (_) {}
    };

    $('closeMsgModalBtn').onclick = () => closeMsgCenter();
    $('msgModal').addEventListener('click', e => {
      if (e.target.id === 'msgModal') closeMsgCenter();
    });

    $('markAllReadBtn').onclick = async () => {
      try {
        if (!state.token) throw new Error('请先登录');
        await api('/api/notifications/read-all', { method: 'POST', body: '{}' });
        state.notifications = state.notifications.map(n => ({ ...n, read_at: n.read_at || Date.now() }));
        state.unreadCount = 0;
        renderNotifications();
        setActionMsg('消息已全部标记为已读', 'ok');
      } catch (err) {
        setActionMsg(err.message, 'err');
      }
    };

    $('createBtn').onclick = async () => {
      try {
        if (!state.token) throw new Error('请先登录');
        await api('/api/projects', {
          method: 'POST',
          body: JSON.stringify({
            name: $('projectName').value.trim(),
            starterText: $('starterText').value.trim()
          })
        });
        $('projectName').value = '';
        $('starterText').value = '';
        await loadProjects();
        setActionMsg('项目已创建', 'ok');
      } catch (err) {
        setActionMsg(err.message, 'err');
      }
    };

    $('lockBtn').onclick = async () => {
      try {
        if (!state.currentProjectId) throw new Error('请先选择项目');
        if (!state.token) throw new Error('请先登录');
        await api(`/api/projects/${state.currentProjectId}/lock`, { method: 'POST', body: '{}' });
        startLockHeartbeat();
        await loadProjectDetail(state.currentProjectId);
        setActionMsg('已获得续写权（每20秒自动续期）', 'ok');
      } catch (err) {
        setActionMsg(err.message, 'err');
      }
    };

    $('appendBtn').onclick = async () => {
      try {
        if (!state.token) throw new Error('请先登录');
        const content = $('continuation').value.trim();
        if (!content) throw new Error('续写内容不能为空');
        await api(`/api/projects/${state.currentProjectId}/segments`, {
          method: 'POST',
          body: JSON.stringify({ content })
        });
        stopLockHeartbeat();
        $('continuation').value = '';
        await loadProjectDetail(state.currentProjectId);
        setActionMsg('续写已提交，并已移交续写权', 'ok');
      } catch (err) {
        setActionMsg(err.message, 'err');
      }
    };

    $('deleteBtn').onclick = async () => {
      try {
        if (!state.token) throw new Error('请先登录');
        if (!state.currentProjectId) throw new Error('请先选择项目');
        if (!state.currentProject || state.currentProject.creator_name !== state.user) {
          throw new Error('仅项目创建者可删除项目');
        }
        if (!confirm('删除后不可恢复，确认删除该项目吗？')) return;

        await api(`/api/projects/${state.currentProjectId}`, { method: 'DELETE' });
        stopLockHeartbeat();
        state.currentProjectId = null;
        state.currentProject = null;
        $('continuation').value = '';
        renderProjectDetail();
        await loadProjects();
        setActionMsg('项目已删除', 'ok');
      } catch (err) {
        setActionMsg(err.message, 'err');
      }
    };

    $('adminSendBtn').onclick = async () => {
      try {
        if (!state.isAdmin) throw new Error('仅管理员可执行此操作');
        const toUserId = Number($('adminUserSelect').value || 0);
        const title = $('adminMsgTitle').value.trim();
        const content = $('adminMsgContent').value.trim();
        if (!toUserId) throw new Error('请选择接收账号');
        if (!title) throw new Error('请输入消息标题');
        if (!content) throw new Error('请输入消息内容');

        await api('/api/admin/message', {
          method: 'POST',
          body: JSON.stringify({ toUserId, title, content })
        });
        $('adminMsgTitle').value = '';
        $('adminMsgContent').value = '';
        setActionMsg('管理员消息已发送', 'ok');
        await loadAdminOverview();
      } catch (err) {
        setActionMsg(err.message, 'err');
      }
    };

    $('adminProjects').addEventListener('click', async (e) => {
      const target = e.target.closest('button[data-admin-action]');
      if (!target) return;

      try {
        if (!state.isAdmin) throw new Error('仅管理员可执行此操作');
        const action = target.dataset.adminAction;
        const projectId = Number(target.dataset.projectId || 0);
        if (!projectId || !action) return;

        const actionTextMap = {
          'force-delete': '强制删除',
          'force-complete': '强制完成',
          reopen: '重新开放'
        };
        const ok = confirm(`确认执行“${actionTextMap[action] || action}”？`);
        if (!ok) return;

        await api(`/api/admin/projects/${projectId}/${action}`, {
          method: 'POST',
          body: '{}'
        });

        if (state.currentProjectId === projectId) {
          state.currentProjectId = null;
          state.currentProject = null;
          renderProjectDetail();
        }
        await loadProjects();
        await loadAdminOverview();
        await loadNotifications();
        setActionMsg(`管理员操作已执行：${actionTextMap[action] || action}`, 'ok');
      } catch (err) {
        setActionMsg(err.message, 'err');
      }
    });

    $('completeBtn').onclick = async () => {
      try {
        if (!state.token) throw new Error('请先登录');
        await api(`/api/projects/${state.currentProjectId}/complete`, { method: 'POST', body: '{}' });
        stopLockHeartbeat();
        await loadProjectDetail(state.currentProjectId);
        await loadProjects();
        setActionMsg('项目已完成', 'ok');
      } catch (err) {
        setActionMsg(err.message, 'err');
      }
    };

    window.addEventListener('beforeunload', () => {
      if (state.currentProjectId && state.token) {
        navigator.sendBeacon(`${API_BASE}/api/projects/${state.currentProjectId}/unlock`, new Blob(['{}'], { type: 'application/json' }));
      }
    });

    const boot = async () => {
      if (!API_BASE) {
        $('configWarning').style.display = 'block';
        $('configWarning').textContent = '未配置后端接口：请将 source-wf/index.html 里的 API_BASE 替换为你的 Worker 地址。';
      }
      setAuthState();
      try {
        await loadProjects();
        await loadNotifications();
        await loadAdminOverview();
      } catch (_) {}
      setInterval(() => {
        if (state.currentProjectId) loadProjectDetail(state.currentProjectId).catch(() => {});
        loadProjects().catch(() => {});
        loadNotifications().catch(() => {});
        if (state.isAdmin) loadAdminOverview().catch(() => {});
      }, 8000);
    };

    boot();
  </script>
</body>
</html>
